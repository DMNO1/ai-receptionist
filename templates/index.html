<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ shop_name }} - AI智能客服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
               background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: #4caf50; color: #fff; padding: 12px 16px; display: flex;
                 justify-content: space-between; align-items: center; flex-shrink: 0; }
        header h2 { font-size: 18px; }
        header nav { display: flex; gap: 12px; }
        header nav a { color: rgba(255,255,255,.9); text-decoration: none; font-size: 13px; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 16px; max-width: 600px; width: 100%; margin: 0 auto; }
        
        .message { margin: 8px 0; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message .bubble { padding: 10px 14px; border-radius: 12px; max-width: 80%;
                           word-break: break-word; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .message.user .bubble { background: #4caf50; color: #fff; border-bottom-right-radius: 4px; }
        .message.bot .bubble { background: #fff; color: #333; border-bottom-left-radius: 4px;
                               box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        
        .quick-replies { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 16px 8px;
                         max-width: 600px; width: 100%; margin: 0 auto; }
        .quick-replies button { padding: 6px 14px; border: 1px solid #4caf50; border-radius: 16px;
                                background: #fff; color: #4caf50; font-size: 13px; cursor: pointer;
                                transition: all .2s; }
        .quick-replies button:hover { background: #4caf50; color: #fff; }
        
        .input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #e0e0e0;
                      display: flex; gap: 8px; flex-shrink: 0; max-width: 600px; width: 100%; margin: 0 auto; }
        .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px;
                            font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #4caf50; }
        .input-area button { padding: 10px 20px; background: #4caf50; color: #fff; border: none;
                             border-radius: 20px; cursor: pointer; font-size: 14px; }
        .input-area button:disabled { background: #ccc; }
        
        .typing { display: none; padding: 8px 14px; color: #999; font-size: 13px; }
        .typing.active { display: block; }
    </style>
</head>
<body>
<header>
    <h2>🤖 {{ shop_name }}</h2>
    <nav><a href="/">💬 聊天</a><a href="/dashboard">📊 看板</a></nav>
</header>

<div class="chat-container" id="chat">
    <div class="message bot"><div class="bubble" id="welcome"></div></div>
</div>
<div class="typing" id="typing">正在输入...</div>
<div class="quick-replies" id="quick-replies"></div>
<div class="input-area">
    <input id="input" placeholder="输入消息..." autocomplete="off">
    <button id="send-btn" onclick="sendMessage()">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const typing = document.getElementById('typing');
const quickReplies = document.getElementById('quick-replies');
const sendBtn = document.getElementById('send-btn');

// Welcome message
document.getElementById('welcome').textContent = '您好！欢迎来到{{ shop_name }}，请问有什么可以帮您？';
setQuickReplies(['查报价', '预约到店', '营业时间', '联系电话']);

input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setQuickReplies(replies) {
    quickReplies.innerHTML = '';
    if (!replies || replies.length === 0) return;
    replies.forEach(r => {
        const btn = document.createElement('button');
        btn.textContent = r;
        btn.onclick = () => { input.value = r; sendMessage(); };
        quickReplies.appendChild(btn);
    });
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    
    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;
    typing.classList.add('active');
    setQuickReplies([]);
    
    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text, session_id: 'web_' + Date.now()})
        });
        const data = await resp.json();
        typing.classList.remove('active');
        addMessage(data.response, 'bot');
        setQuickReplies(data.quick_replies);
    } catch (e) {
        typing.classList.remove('active');
        addMessage('抱歉，出了点问题，请稍后再试。', 'bot');
    }
    sendBtn.disabled = false;
    input.focus();
}
</script>
</body>
</html>
