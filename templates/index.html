<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ shop_name }} — AI智能客服</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .message-enter { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator span { animation: blink 1.4s infinite both; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-t-2xl p-4 shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-2xl">🤖</div>
                <div>
                    <h1 class="text-lg font-bold">{{ shop_name }}</h1>
                    <p class="text-blue-100 text-sm">AI智能客服 · 在线</p>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatBox" class="chat-container bg-white overflow-y-auto p-4 space-y-4">
            <div class="message-enter flex gap-3">
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-sm flex-shrink-0">🤖</div>
                <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[80%]">
                    <p id="greetingMsg">您好！欢迎咨询，我是AI智能客服。请问有什么可以帮您？</p>
                </div>
            </div>
            <!-- Quick replies shown initially -->
            <div id="quickReplies" class="flex flex-wrap gap-2 ml-11">
                <button onclick="sendQuickReply('查报价')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-sm hover:bg-blue-100 transition">查报价</button>
                <button onclick="sendQuickReply('预约到店')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-sm hover:bg-blue-100 transition">预约到店</button>
                <button onclick="sendQuickReply('营业时间')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-sm hover:bg-blue-100 transition">营业时间</button>
                <button onclick="sendQuickReply('地址在哪')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-sm hover:bg-blue-100 transition">地址在哪</button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-white border-t p-3 rounded-b-2xl shadow-lg">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="输入您的问题..." 
                    class="flex-1 px-4 py-2.5 bg-gray-100 rounded-full outline-none focus:ring-2 focus:ring-blue-300 transition"
                    onkeydown="if(event.key==='Enter') sendMessage()"
                >
                <button 
                    onclick="sendMessage()" 
                    class="px-5 py-2.5 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition font-medium"
                >发送</button>
            </div>
            <p class="text-center text-gray-400 text-xs mt-2">AI客服 · 7×24小时在线</p>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sessionId = 'session_' + Date.now();

        function addMessage(text, isUser = false) {
            const quickRepliesDiv = document.getElementById('quickReplies');
            if (quickRepliesDiv) quickRepliesDiv.remove();

            const div = document.createElement('div');
            div.className = `message-enter flex gap-3 ${isUser ? 'flex-row-reverse' : ''}`;

            const avatar = isUser
                ? '<div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center text-sm flex-shrink-0">👤</div>'
                : '<div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-sm flex-shrink-0">🤖</div>';

            const bubble = isUser
                ? `<div class="bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-2 max-w-[80%]"><p>${escapeHtml(text)}</p></div>`
                : `<div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[80%]"><p>${text.replace(/\n/g, '<br>')}</p></div>`;

            div.innerHTML = avatar + bubble;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addQuickReplies(replies) {
            if (!replies || replies.length === 0) return;
            const div = document.createElement('div');
            div.className = 'flex flex-wrap gap-2 ml-11';
            div.id = 'quickReplies';
            replies.forEach(r => {
                div.innerHTML += `<button onclick="sendQuickReply('${r}')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-sm hover:bg-blue-100 transition">${r}</button>`;
            });
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'message-enter flex gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-sm flex-shrink-0">🤖</div>
                <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-3">
                    <div class="typing-indicator flex gap-1">
                        <span class="w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
                    </div>
                </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            messageInput.value = '';
            showTyping();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await resp.json();
                removeTyping();
                addMessage(data.response);
                addQuickReplies(data.quick_replies);
            } catch (e) {
                removeTyping();
                addMessage('抱歉，网络出了点问题，请稍后再试。');
            }
        }

        function sendQuickReply(text) {
            messageInput.value = text;
            sendMessage();
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
